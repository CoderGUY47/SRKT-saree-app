name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: SRKT

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        working-directory: SRKT

      - name: Run tests
        run: flutter test
        working-directory: SRKT
